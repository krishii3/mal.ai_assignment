name: Streamlit Deployment Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-streamlit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build pipeline outputs
        run: python -m src.main

      - name: Start Streamlit in headless mode
        run: |
          streamlit run streamlit_app.py --server.headless true --server.port 8501 > streamlit.log 2>&1 &
          echo $! > streamlit.pid

      - name: Wait for Streamlit health check
        run: |
          python - <<'PY'
          import sys
          import time
          import urllib.request

          url = "http://127.0.0.1:8501"
          for _ in range(60):
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      html = response.read().decode("utf-8", errors="ignore")
                  if "Mal — Unified Payment Data Pipeline" in html:
                      sys.exit(0)
              except Exception:
                  pass
              time.sleep(1)

          raise SystemExit("Streamlit did not become ready in time.")
          PY

      - name: Show Streamlit logs on failure
        if: failure()
        run: cat streamlit.log

      - name: Stop Streamlit
        if: always()
        run: kill $(cat streamlit.pid)